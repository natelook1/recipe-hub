version: "3.8"

services:
  api:
    image: recipe-hub-api:latest
    networks:
      - proxy_stable
    environment:
      - PORT=3000
      - DB_PATH=/data/recipe-hub.db
      - IMAGE_PATH=/data/images
    ports:
      - target: 3000
        published: 3002
        protocol: tcp
        mode: host
    secrets:
      - gemini_api_key
      - recipe_api_key
    volumes:
      - /etc/recipe-hub/data:/data
    deploy:
      replicas: 1
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.hostname == your-swarm-node
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=proxy_stable"
        - "traefik.http.routers.recipe-api.rule=Host(`your-api-domain.example.com`)"
        - "traefik.http.routers.recipe-api.entrypoints=websecure"
        - "traefik.http.routers.recipe-api.tls=true"
        - "traefik.http.services.recipe-api-svc.loadbalancer.server.port=3000"

networks:
  proxy_stable:
    external: true
  default:
    external: true
    name: proxy_stable

secrets:
  gemini_api_key:
    external: true
  recipe_api_key:
    external: true
